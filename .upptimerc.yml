owner: superlaza
repo: turi-status

sites:
  # === Our infrastructure ===
  - name: turi API (api.turi.chat)
    url: https://api.turi.chat/health
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/activity.svg
    tags: turi

  - name: turi Web (operator UI, Railway)
    url: https://chatbot-web-production-f931.up.railway.app/sign-in
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/monitor.svg
    tags: turi

  - name: Render standby (api)
    url: https://fsa-chatbot-sf68.onrender.com/health
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/shield.svg
    tags: turi

  # === External providers we depend on ===
  - name: ManyChat API
    url: https://manychat.com
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/message-square.svg
    tags: provider
    # ManyChat has no public health endpoint and their API requires auth.
    # We probe their marketing site as a proxy — if their CDN is up, the API
    # behind it almost certainly is too. False-positive rate is low.
    expectedStatusCodes: [200, 301, 302]

  - name: Gemini API
    url: https://generativelanguage.googleapis.com/v1beta/models
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/cpu.svg
    tags: provider
    # 401 = auth required = endpoint is alive
    expectedStatusCodes: [200, 401, 403]

  - name: Calendly API
    url: https://api.calendly.com/users/me
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/calendar.svg
    tags: provider
    expectedStatusCodes: [200, 401, 403]

  - name: Clerk API (auth)
    url: https://api.clerk.com/v1/health
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/lock.svg
    tags: provider
    expectedStatusCodes: [200, 401, 403, 404]

  - name: Cloudflare (DNS + edge)
    url: https://www.cloudflare.com/cdn-cgi/trace
    icon: https://raw.githubusercontent.com/feathericons/feather/master/icons/cloud.svg
    tags: provider

# Check every 5 minutes by default (GitHub Actions cron min granularity is 5min anyway)
delay: 5000

# Group displays on the status page
status-website:
  # Default URL is superlaza.github.io/turi-status — leave commented unless we set up status.turi.chat
  # cname: status.turi.chat
  baseUrl: /turi-status
  logoUrl: https://raw.githubusercontent.com/feathericons/feather/master/icons/activity.svg
  name: turi status
  introTitle: "**turi** infrastructure status"
  introMessage: Live health of turi services and our upstream providers. Updates every 5 minutes via GitHub Actions. Powered by [Upptime](https://upptime.js.org).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/superlaza/turi-status

# Notifications — Discord webhook is wired via NOTIFICATION_DISCORD_WEBHOOK_URL secret.
# upptime auto-posts on status change (up → down, down → up) when this secret exists.
# Comment block below is reference for additional channels if we add them later:
#   NOTIFICATION_SLACK_WEBHOOK_URL — Slack
#   NOTIFICATION_TELEGRAM_BOT_TOKEN + NOTIFICATION_TELEGRAM_CHAT_ID — Telegram
#   NOTIFICATION_EMAIL — SMTP

# Auto-create GitHub Issues on downtime (helpful audit trail; closes when service recovers)
assignees:
  - superlaza
